[General]
# Aspecto alineado con el escritorio BookOS actual (light + fondo con blur).
# bgImage es relativo al tema (autocontenido) — funciona en la ISO sin rutas de usuario.
variant=light
background=blur
bgImage=backgrounds/bookos.png
accentColor=#007AFF
clockFormat=24h
clockFont=serif
blurRadius=30
showDate=true
showBattery=true
showBookBar=true
